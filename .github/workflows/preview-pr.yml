name: Preview Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build PR Preview
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Validate static site
        run: npm run validate:site

      - name: Validate built output links
        run: npm run validate:dist

      - name: Evaluate preview prerequisites
        id: gate
        env:
          SWA_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -n "$SWA_API_TOKEN" ]; then
            echo "can_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped preview deploy
        if: steps.gate.outputs.can_preview != 'true'
        run: |
          echo "PR preview deployment skipped because AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."
          echo "This is expected until deploy-test phase 1 has created the SWA and phase 2 has stored the token in the test environment."
          echo "CI validation still covers build, SEO checks, links, infra, and workflow syntax."

      - name: Deploy SWA preview environment
        if: steps.gate.outputs.can_preview == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: .
          skip_app_build: true

  close-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview
    timeout-minutes: 10
    steps:
      - name: Evaluate preview close prerequisites
        id: gate
        env:
          SWA_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -n "$SWA_API_TOKEN" ]; then
            echo "can_close=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_close=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped preview close
        if: steps.gate.outputs.can_close != 'true'
        run: echo "Preview close skipped because AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."

      - name: Close SWA preview environment
        if: steps.gate.outputs.can_close == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
