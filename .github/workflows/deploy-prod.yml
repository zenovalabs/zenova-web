name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy Production Environment
    environment: prod
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Validate static site
        run: npm run validate:site

      - name: Validate built output links
        run: npm run validate:dist

      - name: Validate public infra foundation
        run: npm run validate:infra

      - name: Validate GitHub workflows
        run: npm run validate:workflows

      - name: Evaluate release branch
        id: release_ref
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "can_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate deploy prerequisites
        id: infra_gate
        if: steps.release_ref.outputs.can_release == 'true'
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_DEPLOYMENT_LOCATION: ${{ vars.AZURE_DEPLOYMENT_LOCATION }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ] && [ -n "$AZURE_DEPLOYMENT_LOCATION" ]; then
            echo "can_bootstrap=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_bootstrap=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate content deploy prerequisites
        id: content_gate
        if: steps.release_ref.outputs.can_release == 'true'
        env:
          SWA_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -n "$SWA_API_TOKEN" ]; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skipped non-main deploy
        if: steps.release_ref.outputs.can_release != 'true'
        run: echo "Production deployment skipped because only the main branch is allowed to deploy."

      - name: Explain skipped infra bootstrap
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap != 'true'
        run: |
          echo "Production infra bootstrap skipped because the GitHub Environment 'prod' is not fully configured."
          echo "Required vars: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_DEPLOYMENT_LOCATION."

      - name: Azure login with OIDC
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy production infrastructure
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true'
        id: infra_deploy
        run: |
          ATTEMPT=1
          MAX_ATTEMPTS=6

          while true; do
            set +e
            DEPLOY_OUTPUT="$(az deployment sub create \
              --name "zenova-web-prod-${{ github.run_id }}" \
              --location "${{ vars.AZURE_DEPLOYMENT_LOCATION }}" \
              --template-file infra/main.bicep \
              --parameters infra/params/prod.bicepparam \
              --query properties.outputs \
              --output json 2>&1)"
            DEPLOY_EXIT=$?
            set -e

            if [ $DEPLOY_EXIT -eq 0 ]; then
              printf '%s\n' "$DEPLOY_OUTPUT" > /tmp/zenova-prod-outputs.json
              break
            fi

            if printf '%s\n' "$DEPLOY_OUTPUT" | grep -q "A create or update operation is currently in progress for the static web app"; then
              if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                printf '%s\n' "$DEPLOY_OUTPUT"
                exit $DEPLOY_EXIT
              fi

              echo "Static Web App update is still in progress. Waiting before retry $((ATTEMPT + 1))/$MAX_ATTEMPTS..."
              ATTEMPT=$((ATTEMPT + 1))
              sleep 60
            else
              printf '%s\n' "$DEPLOY_OUTPUT"
              exit $DEPLOY_EXIT
            fi
          done

          STATIC_SITE_NAME="$(jq -r '.staticSiteName.value' /tmp/zenova-prod-outputs.json)"
          STATIC_SITE_HOSTNAME="$(jq -r '.staticSiteDefaultHostname.value' /tmp/zenova-prod-outputs.json)"
          EDGE_STATUS="$(jq -r '.enterpriseGradeEdgeStatus.value' /tmp/zenova-prod-outputs.json)"
          PHASE_TWO_READY="$(jq -r '.bootstrapPhaseTwoReady.value' /tmp/zenova-prod-outputs.json)"

          echo "static_site_name=$STATIC_SITE_NAME" >> "$GITHUB_OUTPUT"
          echo "static_site_hostname=$STATIC_SITE_HOSTNAME" >> "$GITHUB_OUTPUT"
          echo "enterprise_edge_status=$EDGE_STATUS" >> "$GITHUB_OUTPUT"
          echo "phase_two_ready=$PHASE_TWO_READY" >> "$GITHUB_OUTPUT"

      - name: Explain bootstrap outputs
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true'
        run: |
          echo "Production infrastructure bootstrap completed."
          echo "Static Web App name: ${{ steps.infra_deploy.outputs.static_site_name }}"
          echo "Static Web App default hostname: https://${{ steps.infra_deploy.outputs.static_site_hostname }}"
          echo "Enterprise edge status: ${{ steps.infra_deploy.outputs.enterprise_edge_status }}"
          echo "Phase 2 ready: ${{ steps.infra_deploy.outputs.phase_two_ready }}"

      - name: Explain pending phase 2 bootstrap
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true' && steps.content_gate.outputs.can_publish != 'true'
        run: |
          echo "Phase 1 completed: RG + SWA + enterprise edge-ready production foundation now exist."
          echo "Phase 2 is still pending because AZURE_STATIC_WEB_APPS_API_TOKEN is not configured."
          echo "1. In Azure Portal open Static Web App '${{ steps.infra_deploy.outputs.static_site_name }}'."
          echo "2. Copy the deployment token from Manage deployment token, or run:"
          echo "   az staticwebapp secrets list --name '${{ steps.infra_deploy.outputs.static_site_name }}' --query properties.apiKey -o tsv"
          echo "3. Save it as the GitHub Environment secret 'AZURE_STATIC_WEB_APPS_API_TOKEN' in environment 'prod'."
          echo "4. Attach the production custom domains in SWA, set 'zenova.sk' as the default domain, and let SWA redirect the remaining custom domains to that default host."
          echo "5. Rerun this workflow to execute phase 2 and publish dist/ to https://${{ steps.infra_deploy.outputs.static_site_hostname }}"

      - name: Deploy production website
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true' && steps.content_gate.outputs.can_publish == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          output_location: .
          skip_app_build: true

      - name: Confirm phase 2 deploy
        if: steps.release_ref.outputs.can_release == 'true' && steps.infra_gate.outputs.can_bootstrap == 'true' && steps.content_gate.outputs.can_publish == 'true'
        run: |
          echo "Phase 2 completed: content uploaded to https://${{ steps.infra_deploy.outputs.static_site_hostname }}"
          echo "Production domain onboarding remains a follow-up step: attach zenova.sk and zenovalabs.* in SWA, set zenova.sk as default, and verify redirect consolidation."
